<!-- Load the latest remote engine CDN (parsed sequentially, overrides local global if online) -->
<script id="ankifx-engine-script" src="https://cdn.jsdelivr.net/gh/robkipa/ankifx@latest/build/_ankifx.js" 
        onload="window.AnkiFX_Loader_Logs.push('Remote _ankifx.js script executed.'); if(window.AnkiFX) { window.AnkiFX.source = 'remote'; }" 
        onerror="window.AnkiFX_Loader_Logs.push('Remote _ankifx.js script failed to load.'); console.warn('AnkiFX: CDN failed to load, using local engine.')"></script>

<script>
    // Closure-scoped flags to prevent duplicate execution within the same card's lifecycle
    var contentInitialized = false;
    var ankiFXInitialized = false;

    // Optional Eruda mobile console debugger in debug mode
    function loadEruda() {
        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (window.AnkiFX_Config && window.AnkiFX_Config.debug && isMobileDevice && !window.eruda) {
            window.AnkiFX_Loader_Logs.push("Loading Eruda mobile debugger...");
            const erudaScript = document.createElement('script');
            erudaScript.src = "https://cdn.jsdelivr.net/npm/eruda";
            erudaScript.onload = function () {
                eruda.init();
                window.AnkiFX_Loader_Logs.push("Eruda initialized.");
            };
            erudaScript.onerror = function () {
                window.AnkiFX_Loader_Logs.push("Eruda failed to load.");
            };
            document.head.appendChild(erudaScript);
        }
    }

    /**
     * Resilient AnkiFX Loader
     * Always populates MCQ questions and options immediately so the card remains fully functional for study,
     * and progressively enhances it with AnkiFX visualizers once loaded.
     */
    function triggerAnkiFX() {
        window.AnkiFX_Loader_Logs.push("triggerAnkiFX called.");
        // 1. Load eruda if in debug mode on mobile
        loadEruda();

        // 2. Initialize AnkiFX first if loaded
        if (!ankiFXInitialized && typeof AnkiFX !== 'undefined') {
            try {
                window.AnkiFX_Loader_Logs.push("Initializing AnkiFX engine (Source: " + AnkiFX.source + ", Version: " + AnkiFX.version + ")...");
                ankiFXInitialized = true;
                AnkiFX.init();
                window.AnkiFX_Loader_Logs.push("AnkiFX.init() success.");
            } catch (e) {
                window.AnkiFX_Loader_Logs.push("AnkiFX init error: " + e.message);
                console.error("AnkiFX Start Error:", e);
            }
        } else if (typeof AnkiFX === 'undefined') {
            window.AnkiFX_Loader_Logs.push("AnkiFX not defined at trigger time.");
        }

        // 3. Then run the card's native content/table generator
        if (!contentInitialized && typeof run === 'function') {
            try {
                window.AnkiFX_Loader_Logs.push("Running card content run()...");
                contentInitialized = true;
                run();
                window.AnkiFX_Loader_Logs.push("Card content run() success.");
            } catch (e) {
                window.AnkiFX_Loader_Logs.push("Card content error: " + e.message);
                console.error("Card Content Run Error:", e);
            }
        }
    }
</script>

<script>
    // --- FINAL EXECUTION TRIGGER ---
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        triggerAnkiFX();
    } else {
        document.addEventListener('DOMContentLoaded', triggerAnkiFX);
    }
</script>
